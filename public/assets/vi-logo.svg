<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" role="img" aria-labelledby="title desc">
  <title id="title">Вредный Инвестор</title>
  <desc id="desc">Логотип проекта Вредный Инвестор</desc>
  <defs>
    <linearGradient id="logoRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2b47"/>
      <stop offset="100%" stop-color="#ff3f57"/>
    </linearGradient>
  </defs>

  <g fill="url(#logoRed)" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="54" font-weight="900" letter-spacing="1.2">
    <text x="64" y="54">ВРЕДНЫЙ</text>
    <text x="64" y="104">ИНВЕСТОР</text>
  </g>

  <!-- Left glitch cuts -->
  <g fill="#f1f3fb">
    <rect x="18" y="18" width="18" height="12" rx="1"/>
    <rect x="26" y="34" width="11" height="10" rx="1"/>
    <rect x="15" y="50" width="24" height="11" rx="1"/>
    <rect x="24" y="66" width="13" height="10" rx="1"/>
    <rect x="14" y="82" width="25" height="11" rx="1"/>
    <rect x="21" y="98" width="16" height="9" rx="1"/>
  </g>
</svg>
